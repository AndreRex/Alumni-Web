<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Public+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              headline: ["Newsreader", "serif"],
              body: ["Public Sans", "sans-serif"],
              label: ["Public Sans", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-white font-body text-gray-800 antialiased flex flex-col min-h-screen"
  >
    <!-- Background Grid Pattern -->
    <div
      class="fixed inset-0 w-full min-h-screen grid grid-cols-2 md:grid-cols-3 grid-rows-2 -z-10 bg-white"
    >
      <div class="bg-[#e4dfc9] w-full h-full"></div>
      <div class="bg-[#b1c3b5] w-full h-full"></div>
      <div class="bg-[#e4dfc9] w-full h-full hidden md:block"></div>

      <div class="bg-[#b1c3b5] w-full h-full"></div>
      <div class="bg-[#e4dfc9] w-full h-full"></div>
      <div class="bg-[#b1c3b5] w-full h-full hidden md:block"></div>
    </div>

    <!-- TopAppBar -->
    <header class="bg-[#fcfbf9] w-full z-50">
      <div
        class="flex justify-between items-center px-8 py-5 w-full max-w-7xl mx-auto"
      >
        <h1
          class="text-[1.35rem] font-headline italic text-[#162138] font-medium tracking-wide"
        >
          Invitation Letter
        </h1>
      </div>
    </header>

    <!-- Main Splash Canvas -->
    <main
      class="flex-grow flex items-center justify-center py-10 px-4 md:px-0 relative w-full"
    >
      <!-- Central Invitation Card -->
      <div
        class="relative z-10 w-full max-w-2xl bg-white rounded-lg shadow-[0_15px_40px_-15px_rgba(0,0,0,0.15)] flex flex-col items-center text-center mt-6 overflow-hidden"
        style="min-height: 550px; padding: 4.5rem 2rem"
      >
        <!-- Branding Accent -->
        <div class="mb-7">
          <div
            class="w-14 h-14 rounded-[0.8rem] bg-[#725321] flex items-center justify-center shadow-[0_4px_10px_rgba(114,83,33,0.3)]"
          >
            <span
              class="material-symbols-outlined text-white text-[28px]"
              style="font-variation-settings: &quot;FILL&quot; 1"
              >history_edu</span
            >
          </div>
        </div>

        <!-- Header Section -->
        <h2
          class="font-headline text-[3rem] md:text-[3.5rem] text-[#162138] mb-6 tracking-tight italic leading-[1.1] font-light"
        >
          Welcome Back,<br />Alumni
        </h2>

        <p
          class="font-headline text-[1.25rem] text-[#555d6e] max-w-[360px] mx-auto leading-relaxed mb-12"
        >
          Before we reveal your special invitation, please let us know...
        </p>

        <!-- Interactive Form -->
        <div class="w-full max-w-[320px] space-y-8 relative z-20">
          <div class="space-y-4">
            <label
              class="block font-label text-[10px] tracking-[0.16em] uppercase text-[#a57a3e] font-bold"
            >
              In which year did you graduate?
            </label>
            <div class="relative group mt-2">
              <input type="number" id="gradYear" placeholder="e.g. 2014" min="2013" max="2026"
                onkeypress="if(event.key === 'Enter') validateAndProceed()"
                class="w-full border-0 outline-none py-5 px-6 font-headline text-[1.4rem] text-[#162138] focus:ring-[1px] focus:ring-[#9b763e] transition-all text-center placeholder:text-[#aea999]"
                style="background-color: #dfdbcd"
              />
            </div>
            <p id="errorMsg" class="font-label text-[11px] text-red-600 tracking-wide mt-2 h-4 transition-opacity opacity-0">Error message goes here</p>
          </div>

          <div class="pt-2">
            <button
              onclick="validateAndProceed()"
              class="relative w-full py-[1.15rem] px-6 rounded shadow-lg overflow-hidden transition-all hover:opacity-90 active:scale-95 bg-gradient-to-r from-[#9b763e] to-[#c29f64]"
            >
              <span
                class="relative z-10 flex items-center justify-center gap-2 font-label text-[10px] tracking-[0.18em] uppercase font-bold text-white"
              >
                Proceed to Invitation
                <span class="material-symbols-outlined text-[18px]"
                  >arrow_forward</span
                >
              </span>
            </button>
            <p
              class="mt-8 font-label text-[9px] tracking-[0.15em] uppercase text-[#b0b3ba]"
            >
              SMA Negeri 3 Tarutung
            </p>
          </div>
        </div>

        <div
          class="absolute bottom-6 right-6 w-32 h-32 opacity-[0.15] pointer-events-none"
        >
          <img
            class="w-full h-full object-contain"
            alt="ornament"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5ZXusMzDLfDkssEg4LmHI9C6pb1jNKGqE8RcvofgPWZH8MEdaeVFWADzDS3FANc2Nh3ZXBfQDDkJLxpIv_dciQieAkoO3-5XIhumbdF-ciHospL0e2I53gsc-Ou0miGFjELSvhm-6ntVzmeYaLKh0GNplQakXHCJOgxh3vZtqeFCnsPEy21i-8ncNQltN57sVWWz4uhbbyGkzoxka80ARhXLVHFmkx_C2xGMHBZ_lXZa8gCciF2470HX9ejx2Rvn4I5nWwQWmq2c"
          />
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-8 bg-[#fdfdfb]">
      <div
        class="flex flex-col md:flex-row justify-between items-center px-12 gap-6 w-full max-w-7xl mx-auto"
      >
        <p
          class="font-sans text-[9px] tracking-[0.1em] uppercase text-[#a5a8ae]"
        >
          © 2026 Rex handmade for Alumni Association. All rights reserved.
        </p>
      </div>
    </footer>
    </footer>

    <script>
      function validateAndProceed() {
        const yearInput = document.getElementById('gradYear').value;
        const errorMsg = document.getElementById('errorMsg');
        const year = parseInt(yearInput, 10);
        const currentYear = new Date().getFullYear();

        if (!yearInput) {
          errorMsg.textContent = "Please enter your graduation year.";
          errorMsg.style.opacity = '1';
          return;
        }

        if (year < 2013) {
          errorMsg.textContent = "Bakti Bangsa was established in 2013. Invalid year.";
          errorMsg.style.opacity = '1';
          return;
        }

        if (year > currentYear) {
          errorMsg.textContent = "Year cannot be in the future.";
          errorMsg.style.opacity = '1';
          return;
        }

        errorMsg.style.opacity = '0';
        window.location.href = 'invitation.html?year=' + year;
      }
    </script>
  </body>
</html>
